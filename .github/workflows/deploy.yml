name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  pull_request_target:
    types: [closed]

jobs:
  deploy-production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - name: Bundle worker
        run: wrangler deploy --dry-run --outdir .cf-pages-bundle
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      - name: Assemble pages directory
        run: |
          mkdir -p .cf-pages-out
          cp -r .open-next/assets/. .cf-pages-out/
          cp .cf-pages-bundle/worker.js .cf-pages-out/_worker.js
          cp .cf-pages-bundle/*.wasm .cf-pages-out/ 2>/dev/null || true
          cp .cf-pages-bundle/*.bin .cf-pages-out/ 2>/dev/null || true
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: pages deploy .cf-pages-out --project-name=starboard --branch=main

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - name: Bundle worker
        run: wrangler deploy --dry-run --outdir .cf-pages-bundle
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      - name: Assemble pages directory
        run: |
          mkdir -p .cf-pages-out
          cp -r .open-next/assets/. .cf-pages-out/
          cp .cf-pages-bundle/worker.js .cf-pages-out/_worker.js
          cp .cf-pages-bundle/*.wasm .cf-pages-out/ 2>/dev/null || true
          cp .cf-pages-bundle/*.bin .cf-pages-out/ 2>/dev/null || true
      - name: Deploy preview to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: pages deploy .cf-pages-out --project-name=starboard --branch=pr-${{ github.event.number }}
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview:** https://pr-${{ github.event.number }}.starboard-69m.pages.dev`
            })

  cleanup-preview:
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: pages deployment delete --project-name=starboard --deployment-id=pr-${{ github.event.number }} --force
